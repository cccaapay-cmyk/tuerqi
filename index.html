<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title></title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #ffffff;
  display: none;
}
</style>

<script>
(() => {
  const rawUsers = [
    "ZeynepKaya1378",
    "Aylin158158",
    "pa6788999889",
    "Amelie663454"
  ];

  const KEY_BAG = "tg_shuffle_bag_page4";
  const KEY_LAST = "tg_last_pick_page4";
  const LOG_URL = "https://script.google.com/macros/s/AKfycbyhzAHINH1fv7GX1-e_kF1sa_gdgF1pWWbdqvaOTkgEUBfdoJMyYZb1iDGKeehYmkxXpA/exec";
  const PAGE_NAME = "page4_telegram";

  function sanitizeUsers(list) {
    const seen = new Set();
    const cleaned = [];

    for (let i = 0; i < list.length; i++) {
      const v = String(list[i]).trim().replace(/^@/, "");
      if (v && !seen.has(v)) {
        seen.add(v);
        cleaned.push(v);
      }
    }

    return cleaned;
  }

  const users = sanitizeUsers(rawUsers);

  function getItem(key) {
    try {
      return localStorage.getItem(key);
    } catch {
      return null;
    }
  }

  function setItem(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch {}
  }

  function shuffle(arr) {
    const copy = arr.slice();
    for (let i = copy.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      const t = copy[i];
      copy[i] = copy[j];
      copy[j] = t;
    }
    return copy;
  }

  function loadBag() {
    try {
      const raw = getItem(KEY_BAG);
      if (!raw) return null;

      const bag = JSON.parse(raw);
      if (!Array.isArray(bag) || bag.length === 0) return null;

      const valid = [];
      for (let i = 0; i < bag.length; i++) {
        if (users.indexOf(bag[i]) !== -1) valid.push(bag[i]);
      }

      return valid.length ? valid : null;
    } catch {
      return null;
    }
  }

  function saveBag(bag) {
    try {
      setItem(KEY_BAG, JSON.stringify(bag));
    } catch {}
  }

  function getLastPick() {
    try {
      return getItem(KEY_LAST) || "";
    } catch {
      return "";
    }
  }

  function setLastPick(value) {
    try {
      setItem(KEY_LAST, value);
    } catch {}
  }

  function pickUser() {
    if (!users.length) return "";

    let bag = loadBag();
    const lastPick = getLastPick();

    if (!bag || bag.length === 0) {
      bag = shuffle(users);

      if (bag.length > 1 && bag[0] === lastPick) {
        const t = bag[0];
        bag[0] = bag[1];
        bag[1] = t;
      }
    }

    const pick = bag[0];
    saveBag(bag.slice(1));
    setLastPick(pick);

    return pick;
  }

  function logVisit(user) {
    try {
      const qs =
        "?mode=log" +
        "&number=" + encodeURIComponent(user) +
        "&page=" + encodeURIComponent(PAGE_NAME) +
        "&ua=" + encodeURIComponent(navigator.userAgent || "") +
        "&ref=" + encodeURIComponent(document.referrer || "");

      const img = new Image();
      img.src = LOG_URL + qs;
    } catch {}
  }

  const u = pickUser();

  if (u) {
    logVisit(u);

    setTimeout(function () {
      location.replace("https://t.me/" + u);
    }, 120);
  } else {
    window.addEventListener("DOMContentLoaded", function () {
      document.body.style.display = "block";
      document.body.textContent = "No valid Telegram username found.";
    });
  }
})();
</script>

</head>
<body></body>
</html>
